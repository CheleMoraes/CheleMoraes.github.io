<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerador de QR Code com Logo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
      background: #f0f2f5;
    }
    h1 { color: #333; margin-bottom: 24px; }

    .controls {
      background: white;
      padding: 28px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 100%;
      max-width: 400px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 13px; color: #555; font-weight: 600; }
    .field input[type="text"],
    .field input[type="number"] {
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .field input[type="text"]:focus,
    .field input[type="number"]:focus { border-color: #25D366; }
    .field input[type="file"] { font-size: 13px; padding: 8px 0; }
    .field input[type="text"],
    .field input[type="number"],
    .field input[type="file"] { width: 100%; }

    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }

    #generate-btn {
      padding: 14px;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    #generate-btn:hover { background: #128C7E; }
    #generate-btn:disabled { background: #aaa; cursor: not-allowed; }

    #result {
      margin-top: 32px;
      display: none;
      flex-direction: column;
      align-items: center;
    }

    #qr-container {
      display: inline-block;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    #qr-display {
      display: block;
      background: white;
    }

    #download-btn {
      margin-top: 20px;
      padding: 12px 28px;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
    }
    #download-btn:hover { background: #128C7E; }

    .status { margin-top: 12px; font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <h1>Gerador de QR Code</h1>

  <div class="controls">
    <div class="field">
      <label for="link-input">Link</label>
      <input type="text" id="link-input" value="https://wa.me/5511911111111?text=Olá! Como posso ajudar?" />
    </div>

    <div class="row">
      <div class="field">
        <label for="qr-size-input">Tamanho (px)</label>
        <input type="number" id="qr-size-input" value="2000" min="200" max="10000" step="100" />
      </div>
      <div class="field">
        <label for="logo-size-input">Logo (%)</label>
        <input type="number" id="logo-size-input" value="30" min="10" max="40" />
      </div>
    </div>

    <div class="field">
      <label for="logo-input">Logo (opcional)</label>
      <input type="file" id="logo-input" accept="image/*" />
    </div>

    <button id="generate-btn">Gerar QR Code</button>
  </div>

  <div id="result">
    <div id="qr-container">
      <img id="qr-display" src="" alt="QR Code" />
    </div>
    <a id="download-btn" href="#" download="qrcode.png">Baixar QR Code</a>
    <p class="status" id="status"></p>
  </div>

  <script>
    var linkInput = document.getElementById('link-input');
    var sizeInput = document.getElementById('qr-size-input');
    var logoSizeInput = document.getElementById('logo-size-input');
    var logoInput = document.getElementById('logo-input');
    var generateBtn = document.getElementById('generate-btn');
    var resultDiv = document.getElementById('result');
    var qrDisplay = document.getElementById('qr-display');
    var downloadBtn = document.getElementById('download-btn');
    var statusEl = document.getElementById('status');

    var logoDataURL = null;

    logoInput.addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (file) {
        var reader = new FileReader();
        reader.onload = function(ev) { logoDataURL = ev.target.result; };
        reader.readAsDataURL(file);
      }
    });

    generateBtn.addEventListener('click', function() {
      var link = linkInput.value.trim();
      if (!link) { alert('Insira um link!'); return; }

      var qrSize = parseInt(sizeInput.value) || 2000;
      var logoPercent = parseInt(logoSizeInput.value) || 30;
      var displaySize = Math.min(qrSize, 500);

      generateBtn.textContent = 'Gerando...';
      generateBtn.disabled = true;
      resultDiv.style.display = 'none';
      statusEl.textContent = '';

      // Step 1: Generate QR via Google Charts API (works from browser, not through server proxy)
      var qrUrl = 'https://chart.googleapis.com/chart?cht=qr&chld=M|2&chs=' + qrSize + 'x' + qrSize + '&chl=' + encodeURIComponent(link);

      // Step 2: Fetch as blob (blobs don't taint canvas — no CORS issues)
      fetch(qrUrl)
        .then(function(r) {
          if (!r.ok) throw new Error('Falha ao gerar QR Code');
          return r.blob();
        })
        .then(function(blob) {
          var blobUrl = URL.createObjectURL(blob);
          var qrImg = new Image();

          qrImg.onload = function() {
            var canvas = document.createElement('canvas');
            canvas.width = qrSize;
            canvas.height = qrSize;
            var ctx = canvas.getContext('2d');

            // Draw QR (from blob = clean canvas, no CORS)
            ctx.drawImage(qrImg, 0, 0);
            URL.revokeObjectURL(blobUrl);

            // Step 3: Overlay logo if provided
            if (logoDataURL) {
              var logoSize = Math.round(qrSize * logoPercent / 100);
              var margin = Math.round(logoSize * 0.04);
              var drawSize = logoSize - margin * 2;
              var lx = (qrSize - logoSize) / 2;
              var ly = (qrSize - logoSize) / 2;

              // White background behind logo
              ctx.fillStyle = '#ffffff';
              ctx.fillRect(lx - margin, ly - margin, logoSize + margin * 2, logoSize + margin * 2);

              var logo = new Image();
              logo.onload = function() {
                ctx.drawImage(logo, lx, ly, drawSize, drawSize);
                sendResult();
              };
              logo.onerror = sendResult;
              logo.src = logoDataURL;
            } else {
              sendResult();
            }

            function sendResult() {
              var url = canvas.toDataURL('image/png');
              downloadBtn.href = url;
              qrDisplay.src = url;
              qrDisplay.style.width = displaySize + 'px';
              qrDisplay.style.height = displaySize + 'px';
              statusEl.textContent = logoDataURL
                ? 'QR Code: ' + qrSize + 'x' + qrSize + 'px — com logo (' + logoPercent + '%)'
                : 'QR Code: ' + qrSize + 'x' + qrSize + 'px';
              resultDiv.style.display = 'flex';
              generateBtn.textContent = 'Gerar QR Code';
              generateBtn.disabled = false;
            }
          };

          qrImg.onerror = function() {
            // Fallback: use direct src
            qrDisplay.src = qrUrl;
            qrDisplay.style.width = displaySize + 'px';
            qrDisplay.style.height = displaySize + 'px';
            downloadBtn.href = qrUrl;
            statusEl.textContent = 'QR Code: ' + qrSize + 'x' + qrSize + 'px (link direto)';
            resultDiv.style.display = 'flex';
            generateBtn.textContent = 'Gerar QR Code';
            generateBtn.disabled = false;
          };

          qrImg.src = blobUrl;
        })
        .catch(function(err) {
          alert('Erro: ' + err.message);
          generateBtn.textContent = 'Gerar QR Code';
          generateBtn.disabled = false;
        });
    });
  </script>
</body>
</html>
